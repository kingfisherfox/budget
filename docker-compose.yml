networks:
  budget-net:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    networks:
      - budget-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expenses
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: deps
    networks:
      - budget-net
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run dev"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/expenses
      PORT: 4000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    networks:
      - budget-net
    command: sh -c "npm install && npm run dev"
    environment:
      API_URL: http://api:4000
    ports:
      - "8081:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  pgdata:
