# API upstream: hostname must resolve (Docker Compose service name "api", or replace with
# 127.0.0.1:4000 if nginx and Node run on the same host without Docker DNS).
# See docs/deployment.md — wrong upstream causes 502; missing /api proxy causes 404 on POST.

server {
    listen 80;
    root /usr/share/nginx/html;

    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Match /api and /api/... (prefix); pass full URI unchanged to Express (app mounted at /api).
    location ^~ /api {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 75s;
        proxy_read_timeout 75s;
    }

    # Optional: same-origin health check through nginx (Express serves GET /health at root).
    location = /health {
        proxy_pass http://api:4000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
